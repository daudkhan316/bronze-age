<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Bronze Age</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background: #0b0d10;
        font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        color: #e6e6e6;
      }
      #app {
        position: fixed;
        inset: 0;
      }
      /* Canvas fills the viewport; rendered at devicePixelRatio for crispness. */
      #game {
        display: block;
        width: 100%;
        height: 100%;
        cursor: crosshair;
        image-rendering: pixelated;
      }
      #hud {
        position: fixed;
        top: 8px;
        left: 8px;
        padding: 6px 10px;
        font-size: 12px;
        line-height: 1.5;
        background: rgba(0, 0, 0, 0.45);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 6px;
        pointer-events: none;
        white-space: pre;
        user-select: none;
      }
      #resbar {
        position: fixed;
        top: 8px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 18px;
        padding: 7px 16px;
        font-size: 13px;
        background: rgba(0, 0, 0, 0.5);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 6px;
        user-select: none;
        pointer-events: none;
        white-space: nowrap;
      }
      #resbar .res {
        display: inline-flex;
        gap: 6px;
        align-items: baseline;
      }
      #resbar .dot {
        width: 10px;
        height: 10px;
        border-radius: 2px;
        align-self: center;
      }
      #resbar .v {
        min-width: 34px;
        text-align: right;
        font-variant-numeric: tabular-nums;
      }
      #controls {
        position: fixed;
        right: 10px;
        bottom: 34px;
        display: flex;
        flex-direction: column;
        gap: 6px;
        align-items: stretch;
      }
      #controls button {
        font: inherit;
        font-size: 12px;
        color: #e6e6e6;
        background: rgba(20, 28, 36, 0.92);
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 6px;
        padding: 8px 12px;
        cursor: pointer;
      }
      #controls button:hover:not(:disabled) {
        background: rgba(40, 54, 68, 0.95);
      }
      #controls button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
      #controls .panel-title {
        font-size: 12px;
        font-weight: 600;
        color: #cdd6df;
        padding: 2px 2px 0;
        user-select: none;
      }
      #controls .panel-hint {
        font-size: 11px;
        color: #9aa4ad;
        padding: 0 2px 2px;
        max-width: 220px;
        user-select: none;
      }
      #help {
        position: fixed;
        bottom: 8px;
        left: 8px;
        font-size: 11px;
        color: #9aa4ad;
        background: rgba(0, 0, 0, 0.35);
        padding: 6px 10px;
        border-radius: 6px;
        pointer-events: none;
        user-select: none;
      }

      /* Minimap: corner overview (drawn by src/render/drawMinimap.ts). */
      #minimap {
        position: fixed;
        right: 10px;
        bottom: 10px;
        width: 200px;
        height: 200px;
        background: #05070a;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 4px;
        cursor: crosshair;
        image-rendering: pixelated;
      }
      /* Save / Load / Menu toolbar (top-right). */
      #toolbar {
        position: fixed;
        top: 8px;
        right: 10px;
        display: flex;
        gap: 6px;
      }
      #toolbar button {
        font: inherit;
        font-size: 12px;
        color: #e6e6e6;
        background: rgba(20, 28, 36, 0.92);
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 6px;
        padding: 6px 12px;
        cursor: pointer;
      }
      #toolbar button:hover:not(:disabled) {
        background: rgba(40, 54, 68, 0.95);
      }
      #toolbar button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
      #savestatus {
        align-self: center;
        font-size: 12px;
        color: #8fe39a;
        padding-right: 4px;
        user-select: none;
      }

      /* Full-screen modal shells used by the lobby (#menu) and the
         victory/defeat screen (#gameover). Hidden via the `hidden` attribute. */
      .overlay {
        position: fixed;
        inset: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(6, 8, 11, 0.82);
        backdrop-filter: blur(2px);
      }
      .overlay[hidden] {
        display: none;
      }
      .overlay .panel {
        min-width: 320px;
        max-width: 440px;
        padding: 24px 28px;
        background: #11161c;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 10px;
        box-shadow: 0 18px 60px rgba(0, 0, 0, 0.55);
      }
      .overlay h1 {
        margin: 0 0 4px;
        font-size: 22px;
        letter-spacing: 0.5px;
      }
      .overlay .sub {
        margin: 0 0 18px;
        font-size: 12px;
        color: #9aa4ad;
      }
      .overlay .field {
        display: flex;
        flex-direction: column;
        gap: 5px;
        margin-bottom: 14px;
      }
      .overlay label {
        font-size: 12px;
        color: #cdd6df;
      }
      .overlay select,
      .overlay input {
        font: inherit;
        font-size: 13px;
        color: #e6e6e6;
        background: rgba(20, 28, 36, 0.92);
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 6px;
        padding: 8px 10px;
      }
      .overlay .seg {
        display: flex;
        gap: 6px;
      }
      .overlay .seg button {
        flex: 1;
        font: inherit;
        font-size: 12px;
        color: #cdd6df;
        background: rgba(20, 28, 36, 0.92);
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 6px;
        padding: 8px 6px;
        cursor: pointer;
      }
      .overlay .seg button[aria-pressed="true"] {
        color: #0b0d10;
        background: #cdd6df;
        border-color: #cdd6df;
        font-weight: 600;
      }
      .overlay .primary {
        width: 100%;
        margin-top: 6px;
        font: inherit;
        font-size: 14px;
        font-weight: 600;
        color: #0b0d10;
        background: #7fb2e6;
        border: none;
        border-radius: 6px;
        padding: 11px 12px;
        cursor: pointer;
      }
      .overlay .primary:hover {
        background: #9cc6f2;
      }
      #gameover h1.win {
        color: #8fe39a;
      }
      #gameover h1.lose {
        color: #e68f8f;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <canvas id="game"></canvas>
      <div id="resbar"></div>
      <div id="controls"></div>
      <div id="hud"></div>
      <div id="help">
        Select: click / drag-box / double-click &nbsp;•&nbsp; Right-click: move / gather / build /
        attack &nbsp;•&nbsp; F: attack-move &nbsp;•&nbsp; villager → build, building → train (Q)
        &nbsp;•&nbsp; Ctrl+1–9 set group / 1–9 recall &nbsp;•&nbsp; Esc: cancel &nbsp;•&nbsp; WASD / edge /
        middle-drag: pan, wheel: zoom, Space: pause
      </div>
      <canvas id="minimap" width="200" height="200"></canvas>
      <div id="toolbar">
        <span id="savestatus"></span>
        <button data-action="save">Save</button>
        <button data-action="load">Load</button>
        <button data-action="menu">Menu</button>
      </div>
    </div>
    <!-- Pre-game lobby (filled by src/ui/Lobby.ts) and end-of-match overlay
         (filled by src/main.ts). Both start hidden; main.ts drives the
         menu → playing → gameover app state. -->
    <div id="menu" class="overlay" hidden></div>
    <div id="gameover" class="overlay" hidden></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
