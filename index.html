<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Bronze Age</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background: #0b0d10;
        font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        color: #e6e6e6;
      }
      #app {
        position: fixed;
        inset: 0;
      }
      /* Canvas fills the viewport; rendered at devicePixelRatio for crispness. */
      #game {
        display: block;
        width: 100%;
        height: 100%;
        cursor: crosshair;
        image-rendering: pixelated;
      }
      #hud {
        position: fixed;
        top: 8px;
        left: 8px;
        padding: 6px 10px;
        font-size: 12px;
        line-height: 1.5;
        background: rgba(0, 0, 0, 0.45);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 6px;
        pointer-events: none;
        white-space: pre;
        user-select: none;
      }
      #resbar {
        position: fixed;
        top: 8px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 18px;
        padding: 7px 16px;
        font-size: 13px;
        background: rgba(0, 0, 0, 0.5);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 6px;
        user-select: none;
        pointer-events: none;
        white-space: nowrap;
      }
      #resbar .res {
        display: inline-flex;
        gap: 6px;
        align-items: baseline;
      }
      #resbar .dot {
        width: 10px;
        height: 10px;
        border-radius: 2px;
        align-self: center;
      }
      #resbar .v {
        min-width: 34px;
        text-align: right;
        font-variant-numeric: tabular-nums;
      }
      #controls {
        position: fixed;
        right: 10px;
        bottom: 34px;
        display: flex;
        flex-direction: column;
        gap: 6px;
        align-items: stretch;
      }
      #controls button {
        font: inherit;
        font-size: 12px;
        color: #e6e6e6;
        background: rgba(20, 28, 36, 0.92);
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 6px;
        padding: 8px 12px;
        cursor: pointer;
      }
      #controls button:hover:not(:disabled) {
        background: rgba(40, 54, 68, 0.95);
      }
      #controls button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
      #controls .panel-title {
        font-size: 12px;
        font-weight: 600;
        color: #cdd6df;
        padding: 2px 2px 0;
        user-select: none;
      }
      #controls .panel-hint {
        font-size: 11px;
        color: #9aa4ad;
        padding: 0 2px 2px;
        max-width: 220px;
        user-select: none;
      }
      #help {
        position: fixed;
        bottom: 8px;
        left: 8px;
        font-size: 11px;
        color: #9aa4ad;
        background: rgba(0, 0, 0, 0.35);
        padding: 6px 10px;
        border-radius: 6px;
        pointer-events: none;
        user-select: none;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <canvas id="game"></canvas>
      <div id="resbar"></div>
      <div id="controls"></div>
      <div id="hud"></div>
      <div id="help">
        Select: click / drag-box / double-click &nbsp;•&nbsp; Right-click: move / gather / build /
        attack &nbsp;•&nbsp; F: attack-move &nbsp;•&nbsp; villager → build, building → train (Q)
        &nbsp;•&nbsp; Esc: cancel &nbsp;•&nbsp; WASD / edge / middle-drag: pan, wheel: zoom, Space: pause
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
